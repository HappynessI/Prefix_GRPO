# Webshop Interaction Configuration
# Webshop环境交互配置（网页购物环境）

interaction:
  - name: webshop
    class_name: verl.interactions.webshop_interaction.WebshopInteraction
    config:
      # Webshop环境服务器地址
      # 端口必须在 config_a100.sh 中与 WEBSHOP_PORT 一致
      env_server_base: "http://127.0.0.1:36005"
      
      # 请求超时（秒）
      timeout: 600
      
      # 最大重试次数
      max_retries: 3

